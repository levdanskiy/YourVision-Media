<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourEurovision | Vienna 2026 Insider Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Inter+Tight:wght@900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: linear-gradient(180deg, #2e0b54 0%, #0a021a 100%); --accent-pink: #ff007f; --accent-cyan: #00f5ff; --accent-acid: #ccff00;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #e0e0e0;
        }
        body { background: var(--bg-deep) fixed; color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; letter-spacing: -0.02em; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 9999; }
        nav { padding: 25px 60px; display: flex; justify-content: space-between; align-items: center; background: rgba(2, 4, 15, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--accent-pink); }
        #clock { font-family: 'Inter Tight', sans-serif; font-size: 1.1rem; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 245, 255, 0.5); border-left: 3px solid var(--accent-cyan); padding-left: 15px; }
        .layout { display: grid; grid-template-columns: 1fr 400px; gap: 60px; padding: 0 60px 60px 60px; margin-top: -100px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 30px; margin-bottom: 40px; }
        .timers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 60px; }
        .timer-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; overflow: hidden; position: relative; }
        .timer-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 3px solid var(--esc-pink); }
        .timer-content { padding: 20px; }
        .timer-label { font-family: 'Inter Tight', sans-serif; font-size: 0.65rem; text-transform: uppercase; color: var(--accent-cyan); margin-bottom: 8px; font-weight: 700; }
        .timer-value { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .hero { height: 50vh; background: linear-gradient(180deg, rgba(2,4,15,0) 0%, rgba(2,4,15,1) 100%), url('assets/ESC_2026_GF.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 0 60px; }
        .hero h1 { font-size: 6rem; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 0.9; }
        .hero p { color: var(--accent-acid); font-weight: 700; text-transform: uppercase; margin-top: 10px; font-family: 'Inter Tight', sans-serif; }
        .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 30px; }
        .section-title { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .scoreboard-row { padding: 18px 0; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .badge { font-family: 'Inter Tight', sans-serif; font-size: 0.6rem; padding: 4px 12px; border-radius: 2px; text-transform: uppercase; font-weight: 700; }
        .badge-qualified { background: var(--accent-pink); color: #fff; }
        .badge-second { border: 1px solid var(--accent-acid); color: var(--accent-acid); }

        /* PLAYER ULTIMATE FIXED */
        .player-card { background: linear-gradient(145deg, #0a0a0a, #1a1a1a); border: 1px solid var(--glass-border); border-radius: 12px; padding: 25px; margin-bottom: 40px; }
        .player-cover { width: 100%; height: 300px; background: #222 url('https://myradio24.com/img/no_cover.png') center/cover; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .player-info { text-align: center; margin-bottom: 20px; }
        .player-title { font-family: 'Inter Tight', sans-serif; font-size: 1.1rem; font-weight: 900; color: #fff; display: block; margin-bottom: 5px; min-height: 1.4em; }
        .player-status { font-family: 'Inter Tight', sans-serif; font-size: 0.6rem; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .player-controls { display: flex; justify-content: center; align-items: center; }
        .play-btn { background: var(--accent-pink); border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.6); }
        .play-btn svg { width: 25px; fill: white; }

        .news-feed { padding-top: 20px; max-height: 150vh; position: sticky; top: 0; overflow-y: auto; scrollbar-width: none; }
        .news-feed::-webkit-scrollbar { display: none; }
        .news-header { font-family: 'Inter Tight', sans-serif; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid var(--accent-pink); padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; background: var(--bg-deep); z-index: 10; letter-spacing: 1px; }
        .news-item { margin-bottom: 30px; }
        .news-date { font-family: 'Inter Tight', sans-serif; font-size: 0.65rem; color: var(--accent-pink); display: block; margin-bottom: 8px; font-weight: 700; }
        .news-title-link { text-decoration: none; color: #fff; }
        .news-title { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; line-height: 1.1; display: block; margin-bottom: 8px; }
        .news-text { font-size: 0.8rem; color: #888; line-height: 1.4; margin: 0; }
    </style>
    <script src="yv_news.js"></script>
</head>
<body>
    <nav><a href="https://t.me/YourEurovision" target="_blank" style="text-decoration:none; color:inherit;"><div class="logo">Your<span>Eurovision</span> / 2026</div></a><div id="clock">RIGA: 00:00:00</div></nav>
    <header class="hero"><p>// VIENNA_SESSION_ACTIVE</p><h1>United By<br>Music</h1></header>
    <div class="layout">
        <main>
            <div class="timers-grid">
                <div class="timer-card"><img src="assets/ESC_2026_SF1.jpg" class="timer-img"><div class="timer-content"><div class="timer-label">Semi-Final 01</div><div class="timer-value" id="timer-sf1">--d --h --m</div></div></div>
                <div class="timer-card"><img src="assets/ESC_2026_SF2.jpg" class="timer-img" style="border-color: var(--esc-cyan);"><div class="timer-content"><div class="timer-label">Semi-Final 02</div><div class="timer-value" id="timer-sf2">--d --h --m</div></div></div>
                <div class="timer-card"><img src="assets/ESC_2026_GF.jpg" class="timer-img" style="border-color: var(--esc-yellow);"><div class="timer-content"><div class="timer-label">Grand Final</div><div class="timer-value" id="timer-gf">--d --h --m</div></div></div>
            </div>
            <div class="section-header"><h2 class="section-title">Scoreboard</h2></div>
            <div class="card" id="scoreboard-body"></div>
            <div class="section-header"><h2 class="section-title">Wildcards</h2></div>
            <div class="card" id="wildcard-body"></div>
        </main>
        <aside class="news-feed">
            <div class="player-card">
                <div id="player-cover" class="player-cover"></div>
                <div class="player-info">
                    <span class="player-title" id="track-title">levdanskiy live</span>
                    <span class="player-status" id="player-status">● ON AIR</span>
                </div>
                <div class="player-controls">
                    <button id="toggle-play" class="play-btn">
                        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                </div>
                <audio id="audio-stream" src="https://live.myradio24.com/levdanskiy" preload="none"></audio>
            </div>
            <div class="news-header"><span>[ Live_News_Wire ]</span><span style="color: var(--accent-pink);">● LIVE</span></div>
            <div id="news-body"></div>
        </aside>
    </div>
    <script>
        const DATES = { sf1: new Date('2026-05-12T22:00:00+02:00'), sf2: new Date('2026-05-14T22:00:00+02:00'), gf: new Date('2026-05-16T22:00:00+02:00') };
        const TOURNAMENT_STATE = {
            "phase": "ROUND_OF_16",
            "qualifiers": [
                {"country": "FI", "name": "Finland", "score": "71%", "status": "WINNER"},
                {"country": "DK", "name": "Denmark", "score": "77%", "status": "WINNER"},
                {"country": "GR", "name": "Greece", "status": "PENDING"},
                {"country": "AU", "name": "Australia", "status": "PENDING"}
            ],
            "eliminated": [
                {"country": "ME", "name": "Montenegro", "score": "29%"},
                {"country": "AT", "name": "Austria", "score": "23%"}
            ]
        };

        function renderScoreboard() {
            const container = document.getElementById('scoreboard-body');
            container.innerHTML = `
                <div class="scoreboard-row">
                    <span>⚔️ BATTLE #1: FINLAND vs MONTENEGRO</span>
                    <div>
                        <span class="badge badge-qualified">FI: 71%</span>
                        <span class="badge" style="opacity:0.5">ME: 29%</span>
                    </div>
                </div>
                <div class="scoreboard-row">
                    <span>⚔️ BATTLE #2: DENMARK vs AUSTRIA</span>
                    <div>
                        <span class="badge badge-qualified">DK: 77%</span>
                        <span class="badge" style="opacity:0.5">AT: 23%</span>
                    </div>
                </div>
                <div class="scoreboard-row">
                    <span>⚔️ BATTLE #3: GREECE vs ALBANIA</span>
                    <span class="badge badge-second">LIVE VOTING</span>
                </div>
            `;
        }
        window.onload = () => { renderScoreboard(); updateClock(); updateTimers(); renderNews(); };

        const audio = document.getElementById('audio-stream');
        const playBtn = document.getElementById('toggle-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const cover = document.getElementById('player-cover');
        const trackTitle = document.getElementById('track-title');

        let lastTrack = "";

        async function fetchCover(trackName) {
            if (!trackName || trackName === lastTrack) return;
            lastTrack = trackName;
            try {
                const searchUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(trackName)}&media=music&limit=1`;
                const response = await fetch(searchUrl);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const highResCover = data.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
                    cover.style.backgroundImage = `url('${highResCover}')`;
                } else {
                    cover.style.backgroundImage = `url('https://myradio24.com/img/no_cover.png')`;
                }
            } catch (e) {
                cover.style.backgroundImage = `url('https://myradio24.com/img/no_cover.png')`;
            }
        }

        async function updateRadio() {
            try {
                const response = await fetch('https://myradio24.com/ru/api/levdanskiy?apikey=e81720544fe8cf709a784a5cf1e4a89c');
                const data = await response.json();
                if (data && data.nowplaying) {
                    trackTitle.innerText = data.nowplaying;
                    fetchCover(data.nowplaying);
                }
            } catch (e) { console.log("Sync Error..."); }
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
                document.getElementById('player-status').innerText = '● CONNECTING...';
                updateRadio();
            } else {
                audio.pause();
                playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
                document.getElementById('player-status').innerText = '● PAUSED';
            }
        };

        function refresh() {
            document.getElementById('scoreboard-body').innerHTML = TOURNAMENT_STATE.qualifiers.map(q => `<div class="scoreboard-row"><span><b>${q.country.toUpperCase()}</b> <small style="font-family:'Inter Tight'; opacity:0.4; margin-left:10px;">GRP_${q.group}</small></span><span class="badge badge-qualified">Qualified</span></div>`).join('');
            document.getElementById('wildcard-body').innerHTML = TOURNAMENT_STATE.wildcards.map(w => `<div class="scoreboard-row"><span><b>${w.country.toUpperCase()}</b> <small style="font-family:'Inter Tight'; opacity:0.4; margin-left:10px;">GRP_${w.group}</small></span><span class="badge badge-second">2nd Chance</span></div>`).join('');
            if (typeof YV_NEWS_DATA !== 'undefined') {
                document.getElementById('news-body').innerHTML = YV_NEWS_DATA.map(n => `<div class="news-item"><span class="news-date">${n.date}</span><a href="${n.url}" target="_blank" class="news-title-link"><span class="news-title">${n.title}</span></a><p class="news-text">${n.text}</p></div>`).join('');
            }
        }
        function update() {
            const now = new Date();
            for (const [id, target] of Object.entries(DATES)) {
                const diff = target - now;
                const el = document.getElementById(`timer-${id}`);
                if (diff <= 0) { el.innerText = "LIVE!"; continue; }
                const d = Math.floor(diff / 86400000), h = Math.floor((diff / 3600000) % 24), m = Math.floor((diff / 60000) % 60), s = Math.floor((diff / 1000) % 60);
                el.innerText = `${d}d ${h}h ${m}m ${s}s`;
            }
            document.getElementById('clock').innerText = "// RIGA_TIME: " + now.toLocaleTimeString('ru-RU');
        }
        setInterval(update, 1000); setInterval(updateRadio, 20000);
        update(); refresh();
    </script>
</body>
</html>
